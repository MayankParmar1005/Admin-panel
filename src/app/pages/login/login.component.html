<div class="login-page">
    <div class="login-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <!-- <div class="login-logo">
                <div class="logo-icon">
                    <i class="bi bi-scissors"></i>
                </div>
                <h1 class="logo-text">LuxeSalon</h1>
                <p class="logo-tagline">Management System</p>
            </div> -->

            <h2 class="login-heading">Welcome Back</h2>
            <p class="login-subheading">Sign in to your dashboard</p>

            @if (errorMessage()) {
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" role="alert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>{{ errorMessage() }}</span>
            </div>
            }

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()"  novalidate>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-group-custom">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" formControlName="email"
                            placeholder="admin@salon.com"  />
                    </div>
                    <!-- @if (submitted && !email) {
                    <div class="invalid-feedback d-block">Email is required.</div>
                    } -->
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group-custom">
                        <i class="bi bi-lock input-icon"></i>
                        <input  [type]="showPassword ? 'text' : 'password'" class="form-control"
                             placeholder="••••••••" formControlName="password" />
                        <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
                            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                        </button>
                    </div>
                    <!-- @if (submitted && !password) {
                    <div class="invalid-feedback d-block">Password is required.</div>
                    } -->
                </div>

                <!-- <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div> -->

                <button type="submit" class="btn-login" [disabled]="loading()">
                    @if (loading()) {
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Signing in...
                    } @else {
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Sign In
                    }
                </button>
            </form>

            <div class="login-hint">
                <i class="bi bi-info-circle me-1"></i>
                Demo: <strong>admin@salon.com</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>
</div>
